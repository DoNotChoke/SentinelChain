# Prometheus scrape config (PLAN §26). Service targets are added as they come online.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # SentinelChain services expose Prometheus metrics on their metrics_port.
  # Example (uncomment when the service is added to the full profile):
  # - job_name: ingestion-usgs
  #   static_configs:
  #     - targets: ["ingestion-usgs:9100"]
