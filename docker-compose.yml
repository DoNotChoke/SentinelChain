# SentinelChain local stack.
#
# Profiles (PLAN §24, IMPLEMENTATION_PLAN §C):
#   core  — minimal day-to-day dev stack (single-broker Kafka, Schema Registry, Postgres,
#           OpenSearch, Redis). Started by `make up`.
#   full  — adds Kafka Connect, Flink, MinIO, MLflow, Prometheus, Grafana, OTel collector.
#           Started by `make up-full`.
#
# A single Kafka broker (KRaft) is used locally on purpose; multi-broker is a `prod` concern
# (see ADR-001). Replication factors are therefore 1 here.

name: sentinelchain

x-restart: &restart
  restart: unless-stopped

services:
  # ── Streaming backbone ──────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    profiles: ["core", "full"]
    <<: *restart
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: "sentinelchain-local-cluster0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    volumes:
      - kafka-data:/var/lib/kafka/data

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    profiles: ["core", "full"]
    <<: *restart
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka:29092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1

  # ── Operational store (CDC source) ──────────────────────────────────────────
  postgres:
    image: postgres:16
    profiles: ["core", "full"]
    <<: *restart
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ── Search / serving ────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    profiles: ["core", "full"]
    <<: *restart
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  redis:
    image: redis:7-alpine
    profiles: ["core", "full"]
    <<: *restart
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  # ── Connect / Flink (full) ──────────────────────────────────────────────────
  kafka-connect:
    image: debezium/connect:2.7.3.Final
    profiles: ["core", "full"]
    <<: *restart
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "sentinel-connect"
      CONFIG_STORAGE_TOPIC: "_connect_configs"
      OFFSET_STORAGE_TOPIC: "_connect_offsets"
      STATUS_STORAGE_TOPIC: "_connect_status"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"

  flink-jobmanager:
    build:
      context: ./infra/flink
    image: sentinelchain/flink:1.18
    profiles: ["full"]
    <<: *restart
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        execution.checkpointing.interval: 10s
    volumes:
      - ./flink/sql:/opt/sql:ro
      # Shaded DataStream job jars, submitted with `flink run` (see scripts/submit-flink-jar.sh).
      - ./flink/jobs:/opt/jobs:ro

  flink-taskmanager:
    build:
      context: ./infra/flink
    image: sentinelchain/flink:1.18
    profiles: ["full"]
    <<: *restart
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # ── Object store / lakehouse / ML ───────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    profiles: ["full"]
    <<: *restart
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - minio-data:/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    profiles: ["full"]
    <<: *restart
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

  # ── Observability (full) ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["full"]
    <<: *restart
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["full"]
    <<: *restart
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    profiles: ["full"]
    <<: *restart
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
    volumes:
      - ./infra/monitoring/otel-collector-config.yaml:/etc/otel/config.yaml:ro

volumes:
  kafka-data:
  postgres-data:
  opensearch-data:
  redis-data:
  minio-data:
  mlflow-data:
  grafana-data:
