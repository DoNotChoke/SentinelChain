# Alembic config for the operational schema.
# The DB URL is injected at runtime from SimulatorSettings (env.py); we do not hard-code it here.
# script_location is resolved relative to THIS file (%(here)s) so it works from any CWD.
[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s/src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
